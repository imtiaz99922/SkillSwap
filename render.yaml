services:
  - type: web
    name: skillswap-backend
    env: node
    branch: main
    root: backend
    nodeVersion: 18
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_ORIGIN
        value: https://skillswap-frontend.onrender.com
      - key: BACKEND_URL
        value: https://skillswap-backend.onrender.com
      - key: FRONTEND_URL
        value: https://skillswap-frontend.onrender.com

  - type: static
    name: skillswap-frontend
    env: static
    branch: main
    root: client
    nodeVersion: 18
    buildCommand: npm install --legacy-peer-deps && npm run build
    publishPath: dist
    plan: free
    envVars:
      - key: VITE_API_BASE
        value: https://skillswap-backend.onrender.com/api
