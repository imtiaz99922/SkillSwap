services:
  - type: web
    name: skillswap-backend
    env: node
    branch: main
    root: backend
    nodeVersion: 18
    buildCommand: npm install --ignore-workspace --no-workspaces
    startCommand: npm start
    plan: free
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_ORIGIN
        value: https://skillswap-frontend.onrender.com
      - key: BACKEND_URL
        value: https://skillswap-backend.onrender.com
      - key: FRONTEND_URL
        value: https://skillswap-frontend.onrender.com

  - type: static
    name: skillswap-frontend
    env: static
    branch: main
    root: client
    nodeVersion: 18
    buildCommand: npm ci --legacy-peer-deps --ignore-workspace --no-workspaces && npm run build
    publishPath: dist
    plan: free
    envVars:
      - key: VITE_API_BASE
        value: https://skillswap-backend.onrender.com/api
