services:
  - type: web
    name: skillswap-backend
    env: node
    branch: main
    root: backend
    nodeVersion: 18
    buildCommand: npm install --ignore-workspace --no-workspaces
    startCommand: npm start
    plan: free
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: static
    name: skillswap-frontend
    env: static
    branch: main
    root: client
    nodeVersion: 18
    buildCommand: npm ci --legacy-peer-deps --ignore-workspace --no-workspaces && npm run build
    publishPath: dist
    plan: free
    envVars:
      - key: VITE_API_BASE
        sync: false
